version: '3.8'
services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DB_URI=postgresql://postgres:password@db:5432/smart_query
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - db
      - chromadb

  db:
    image: postgres:16
    ports:
      - "55432:5432"

    environment:
      POSTGRES_DB: smart_query
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./data/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql


  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
